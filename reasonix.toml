(dart format --set-exit-if-changed lib/benchmark_main.dart 2>&1)", "Bash(# Check if the import path is correct by looking at what flutter/widgets.dart exports\nhead -5 /Users/fyezool/flutter/packages/flutter/lib/widgets.dart 2>/dev/null || echo \"can't access flutter SDK\"\n# Check if WidgetsFlutterBinding is in the binding export\ngrep -l \"WidgetsFlutterBinding\" /Users/fyezool/flutter/packages/flutter/lib/widgets.dart 2>/dev/null || echo \"checking manually\")", "Bash(cd /Users/fyezool/Documents/Development/ocr-mac/ocr_app && flutter build macos 2>&1 | tail -15)", "Bash(ls -la README.md ocr-native/README.md 2>/dev/null; echo \"---\"; ls -la *.md 2>/dev/null)", "Bash(cd ocr-native/OCRServer && swift build --disable-sandbox 2>&1 | tail -30)", "Bash(cd ocr-native/OCRServer && swift build --disable-sandbox 2>&1 | tail -5)", "Bash(cd ocr-native/OCRServer && swift build --disable-sandbox 2>&1 | tail -20)", "Bash(cd ocr-native/OCRServer && swift package clean 2>&1 && swift build --disable-sandbox 2>&1 | tail -15)", "Bash(cd ocr-native/OCRServer && swift build --disable-sandbox 2>&1 | tail -10)", "Bash(# Remove Flutter-specific files and directories\nrm -rf lib/ macos/ test/ tool/ build/ .dart_tool/\nrm -f pubspec.yaml pubspec.lock analysis_options.yaml .metadata ocr_app.iml .flutter-plugins-dependencies\n\n# Rename .gitignore to keep it\necho \"Remaining files:\" && ls -la)", "Bash(# Move everything from ocr-native/ to root\nmv ocr-native/OCR-App .\nmv ocr-native/OCR-App.xcodeproj .\nmv ocr-native/OCRBenchmark .\nmv ocr-native/OCRServer .\nmv ocr-native/tools .\nmv ocr-native/README.md README.md.new\n\n# Remove empty ocr-native dir\nrmdir ocr-native\n\n# Check results\nls -la)", "Bash(rm README.md.new:*)", "Bash(find . -type f -not -path '*/\\.git/*' -not -path '*/\\.build/*' -not -path '*/build/*' -not -path '*/\\.reasonix/*' -not -path '*/\\.codegraph/*' -not -path '*/.swiftpm/*' -not -name '.DS_Store' | sort)", "Bash(# Clean up stale .idea Flutter references\nrm -f .